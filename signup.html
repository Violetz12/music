<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Daily Dose of Music</title>

    <link rel="stylesheet" href="chill.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- TOP NAV -->
    <header class="top-bar">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="discover.html">Discover</a>
            <a href="chill.html" class="active">Chill</a>
        </div>
    </header>

    <!-- SIGNUP CARD -->
    <main class="signup-container">

        <h2>Create Account</h2>

        <div id="errorMessage" class="error-message">
            You don't have an account yet. Please sign up.
        </div>

        <form action="/music/signup.php" method="POST">

            <!-- USERNAME -->
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <!-- PASSWORD -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
            </div>

            <!-- GENRES -->
            <h3>Music Preferences</h3>

            <div class="search-genres">
                <input type="text" id="genreSearch" placeholder="Search genres...">
            </div>

            <div class="genres-grid" id="genresGrid"></div>

            <input type="hidden" name="genres" id="selectedGenres">

            <!-- SUBMIT -->
            <button type="submit">Create Account</button>

        </form>
    </main>

    <script>
        const genres = [
            "acoustic", "afrobeat", "alt-rock", "ambient", "anime", "blues",
            "classical", "country", "dance", "disco", "edm", "electronic",
            "funk", "gospel", "hip-hop", "indie", "jazz", "k-pop",
            "latin", "metal", "pop", "punk", "r-n-b", "rock", "soul",
            "techno", "trance", "world-music"
        ];

        const genresGrid = document.getElementById('genresGrid');
        const selectedGenres = new Set();
        const selectedGenresInput = document.getElementById('selectedGenres');
        const genreSearch = document.getElementById('genreSearch');

        function renderGenres(list) {
            genresGrid.innerHTML = '';

            list.forEach(genre => {
                const div = document.createElement('div');
                div.className = 'genre-item';

                if (selectedGenres.has(genre)) {
                    div.classList.add('selected');
                }

                div.textContent = genre;

                div.onclick = () => {
                    if (selectedGenres.has(genre)) {
                        selectedGenres.delete(genre);
                    } else {
                        selectedGenres.add(genre);
                    }

                    selectedGenresInput.value = [...selectedGenres].join(',');
                    renderGenres(list);
                };

                genresGrid.appendChild(div);
            });
        }

        genreSearch.addEventListener('input', (e) => {
            const value = e.target.value.toLowerCase();
            const filtered = genres.filter(g => g.includes(value));
            renderGenres(filtered);
        });

        renderGenres(genres);

        document.getElementById('signupForm').addEventListener('submit', (e) => {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (password !== confirm) {
                e.preventDefault();
                alert("Passwords do not match!");
                return;
            }

            if (selectedGenres.size === 0) {
                e.preventDefault();
                alert("Select at least one genre!");
                return;
            }
        });

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === '1') {
            document.getElementById('errorMessage').style.display = 'block';
        }
    </script>

</body>

</html>
