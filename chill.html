<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playlists</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="main-container">
    <div class="top-bar">
      <div class="song-search">
        <img src="images/search-13-128.png" alt="Search icon" />
        <input type="text" placeholder="Search for songs..." />
        <button class="search-button">Search</button>
      </div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="discover.html">Discover</a>
        <a href="chill.html" class="active">Chill</a>
      </div>
      <div class="profile-icon"></div>
    </div>


    <div class="container">

      <div class="left-side">
        <h1>Your Playlists</h1>

        <div class="playlist-grid"></div>
      </div>

      <div class="right-side">

        <div class="cd-player">
          <div class="cd-player-inner"></div>
        </div>

        <div id="playlist-view" class="playlist-view">
          <h2>Select a playlist</h2>
          <div id="song-list"></div>
        </div>

      </div>

    </div>

    <script>
      const playlistManager = {
        getAll() {
          return JSON.parse(localStorage.getItem("playlists")) || {};
        },

        get(name) {
          return this.getAll()[name] || [];
        }
      };

      let currentPlaylist = [];
      let currentIndex = 0;


      function loadPlaylists() {
        const grid = document.querySelector(".playlist-grid");
        const data = playlistManager.getAll();

        grid.innerHTML = "";

        const names = Object.keys(data);

        if (names.length === 0) {
          grid.innerHTML = "<p>No playlists yet</p>";
          return;
        }

        names.forEach(name => {
          const songs = data[name];

          const item = document.createElement("div");
          item.className = "playlist-item";

          item.innerHTML = `
          <div class="playlist-item>
            <div class="playlist-icon">🎵</div>
            <div>
              <div class="playlist-name">${name}</div>
              <div class="song-count">${songs.length} songs</div>
            </div>
          </div>
          `;

          item.addEventListener("click", () => {
            openPlaylist(name);
          });

          grid.appendChild(item);
        });
      }

      function openPlaylist(name) {
        const songs = playlistManager.get(name);

        currentPlaylist = songs;
        currentIndex = 0;

        const list = document.getElementById("song-list");
        list.innerHTML = `<h3>${name}</h3>`;

        songs.forEach((song, index) => {
          const div = document.createElement("div");
          div.className = "song-item";

          div.innerText = `${song.title} - ${song.artist}`;

          div.addEventListener("click", () => {
            playSong(index);
          });

          list.appendChild(div);
        });

        if (songs.length > 0) {
          playSong(0);
        }
      }

      async function playSong(index) {
        currentIndex = index;

        const song = currentPlaylist[index];
        if (!song) return;

        const query = `${song.title} ${song.artist}`;

        const res = await fetch(
          `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&key=YOUR_YOUTUBE_API_KEY&type=video&maxResults=1`
        );

        const data = await res.json();

        const video = data.items?.[0];
        if (!video) return;

        document.querySelector(".cd-player-inner").innerHTML = `
    <iframe width="100%" height="100%"
      src="https://www.youtube.com/embed/${video.id.videoId}?autoplay=1"
      frameborder="0"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  `;

        highlightSong(index);
      }

      function highlightSong(index) {
        document.querySelectorAll(".song-item").forEach((el, i) => {
          el.classList.toggle("active", i === index);
        });
      }

      loadPlaylists();
    </script>

</body>

</html>
